<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Oceanside Appliance</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--sky); }
    .not-found { text-align:center; padding:3rem 2rem; }
    .not-found-code { font-family:var(--font-display); font-size:8rem; font-weight:700; color:var(--ocean); opacity:0.2; line-height:1; }
    .not-found-title { font-family:var(--font-display); font-size:2rem; color:var(--navy); margin-bottom:1rem; }
    .not-found-msg { color:var(--gray-mid); margin-bottom:2rem; font-size:1rem; }
  </style>
</head>
<body>
  <div class="not-found">
    <div class="not-found-code">404</div>
    <div class="not-found-title">Page Not Found</div>
    <p class="not-found-msg">The page you're looking for doesn't exist.</p>
    <a href="/" class="btn-primary">← Back to Home</a>
  </div>
</body>
</html>
